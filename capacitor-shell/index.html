<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Money Leak Detector</title>
    <style>
      /* Offline fallback shown only if the WebView cannot reach the app. */
      html, body {
        margin: 0;
        height: 100%;
        background: #0a0c10;
        color: #f4efe3;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: grid;
        place-items: center;
        text-align: center;
      }
      .mark { color: #d4af37; font-size: 40px; font-weight: 700; letter-spacing: 2px; }
      h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.12em; margin: 18px 0 6px; }
      p { font-size: 13px; color: #9aa3af; margin: 0 24px; line-height: 1.6; }
      button {
        margin-top: 22px;
        background: linear-gradient(180deg, #e9c95e 0%, #d4af37 55%, #b8922e 100%);
        color: #14181d;
        border: 0;
        border-radius: 999px;
        padding: 12px 28px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="mark">&#8734;&#36;</div>
      <h1>MONEY LEAK DETECTOR</h1>
      <p>We couldn't reach the network. Check your connection and try again.</p>
      <button onclick="location.href='https://money-leak-detector.vercel.app'">Retry</button>
    </div>
  </body>
</html>
